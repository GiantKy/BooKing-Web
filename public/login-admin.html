<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - LuxStay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1><a href="/">LuxStay</a></h1>
        <p>Bảng điều khiển quản trị</p>
        <div class="admin-badge">🔐 ADMIN PORTAL</div>
      </div>
      <div id="authAlert" class="alert alert-error"></div>
      <div id="authSuccess" class="alert alert-success"></div>
      <form onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label>Tên đăng nhập</label>
          <input type="text" id="adminUser" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="adminPass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-accent">🔐 Đăng Nhập Admin</button>
      </form>
      <div class="auth-footer"><p><a href="/">← Về trang chủ</a></p></div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script>
    async function handleAdminLogin(e) {
      e.preventDefault();
      const username = document.getElementById('adminUser').value;
      const password = document.getElementById('adminPass').value;
      try {
        const res = await fetch('/api/auth/admin-login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
        const data = await res.json();
        if (data.success) {
          document.getElementById('authSuccess').textContent = data.message; document.getElementById('authSuccess').style.display = 'block';
          document.getElementById('authAlert').style.display = 'none';
          setTimeout(() => window.location.href = '/admin/dashboard', 800);
        } else {
          document.getElementById('authAlert').textContent = data.message; document.getElementById('authAlert').style.display = 'block';
          document.getElementById('authSuccess').style.display = 'none';
        }
      } catch(e) { document.getElementById('authAlert').textContent = 'Lỗi kết nối!'; document.getElementById('authAlert').style.display = 'block'; }
    }
  </script>
</body>
</html>
