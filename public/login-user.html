<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - LuxStay</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1><a href="/">LuxStay</a></h1>
        <p>Chào mừng bạn trở lại</p>
      </div>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')" id="tabLogin">Đăng Nhập</div>
        <div class="auth-tab" onclick="switchTab('register')" id="tabRegister">Đăng Ký</div>
      </div>
      <div id="authAlert" class="alert alert-error"></div>
      <div id="authSuccess" class="alert alert-success"></div>

      <!-- Login -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginName">Tên đăng nhập</label>
          <input type="text" id="loginName" placeholder="Nhập tên đăng nhập" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Mật khẩu</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary">🔓 Đăng Nhập</button>
      </form>

      <!-- Register: chỉ cần tên + mật khẩu -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="regName">Tên đăng nhập</label>
          <input type="text" id="regName" placeholder="Nhập tên bạn muốn sử dụng" required>
        </div>
        <div class="form-group">
          <label for="regPassword">Mật khẩu</label>
          <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary">✨ Đăng Ký</button>
      </form>

      <div class="auth-footer">
        <p><a href="/">← Về trang chủ</a></p>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/app.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('registerForm').classList.toggle('active', tab === 'register');
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      hideAlerts();
    }
    function hideAlerts() {
      document.getElementById('authAlert').style.display = 'none';
      document.getElementById('authSuccess').style.display = 'none';
    }
    function showError(msg) { const el = document.getElementById('authAlert'); el.textContent = msg; el.style.display = 'block'; document.getElementById('authSuccess').style.display = 'none'; }
    function showSuccess(msg) { const el = document.getElementById('authSuccess'); el.textContent = msg; el.style.display = 'block'; document.getElementById('authAlert').style.display = 'none'; }

    async function handleLogin(e) {
      e.preventDefault(); hideAlerts();
      const username = document.getElementById('loginName').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) { showSuccess(data.message); setTimeout(() => window.location.href = '/dashboard', 800); }
        else { showError(data.message); }
      } catch (err) { showError('Lỗi kết nối server!'); }
    }

    async function handleRegister(e) {
      e.preventDefault(); hideAlerts();
      const username = document.getElementById('regName').value;
      const password = document.getElementById('regPassword').value;
      try {
        const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) { showSuccess(data.message + ' Đang chuyển hướng...'); setTimeout(() => window.location.href = '/dashboard', 800); }
        else { showError(data.message); }
      } catch (err) { showError('Lỗi kết nối server!'); }
    }
  </script>
</body>
</html>
